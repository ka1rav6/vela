name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: cmake --build build --target run_unit_tests

      - name: Run integration test
        run: ./build/engine

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Velang DSL compiler
        run: |
          cd src/velang
          npm install
          npm run build

      - name: Prepare release directory
        run: |
          mkdir -p release/velang
          strip -s build/engine -o release/vela-engine-linux-x86_64 || cp build/engine release/vela-engine-linux-x86_64
          cp build/libvela.a release/libvela.a
          cp -r include release/headers
          cp README.md release/
          cp LICENSE release/
          cp CMakeLists.txt release/

      - name: Create velang DSL tarball
        run: |
          mkdir -p velang-bundle
          cp src/velang/*.ts velang-bundle/
          cp src/velang/package.json velang-bundle/
          cp src/velang/package-lock.json velang-bundle/
          cp src/velang/tsconfig.json velang-bundle/
          cp -r src/velang/dist velang-bundle/dist
          tar czf velang-dsl.tar.gz -C velang-bundle .

      - name: Create source tarball
        run: git archive --format=tar.gz --prefix=vela-${GITHUB_REF_NAME}/ -o vela-source.tar.gz ${GITHUB_REF_NAME}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/vela-engine-linux-x86_64
            release/libvela.a
            velang-dsl.tar.gz
            vela-source.tar.gz
          generate_release_notes: true
