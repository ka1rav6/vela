name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gcc \
            libyyjson-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build C library and tools
        run: cmake --build build --parallel

      - name: Run unit tests
        run: cmake --build build --target run_unit_tests

      - name: Run integration test
        working-directory: build
        run: ./engine

      - name: Build Vela DSL compiler
        run: |
          cd src/velang
          npm ci
          npm run build

      - name: Prepare release directory
        run: |
          mkdir -p release/velang

          # Strip debug info from demo binary
          strip -s build/engine -o release/vela-engine-linux-x86_64

          # Copy static library (Release build already has no debug info)
          cp build/libvela.a release/libvela.a

          # Headers for embedding
          cp -r include release/headers

          # Vela DSL compiler (compiled JS + TypeScript source)
          cp -r src/velang/dist           release/velang/dist
          cp  src/velang/*.ts             release/velang/
          cp  src/velang/package.json     release/velang/
          cp  src/velang/tsconfig.json    release/velang/

          # Docs and metadata
          cp README.md     release/
          cp LICENSE       release/
          cp RUN_IT.md     release/
          cp CMakeLists.txt release/

      - name: Create source tarball
        run: |
          git archive --format=tar.gz --prefix=vela-${GITHUB_REF_NAME}/ \
            -o vela-source.tar.gz \
            ${GITHUB_REF_NAME}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/vela-engine-linux-x86_64
            release/libvela.a
            vela-source.tar.gz
          generate_release_notes: true
